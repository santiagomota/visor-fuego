project:
  type: website
  output-dir: docs
  resources:
    - "assets/aemet/**"
    - "assets/effis_ba/**"
  render:
    - index.qmd
    - summary.qmd
    - report.qmd
    - history.qmd
    - copernicus.qmd

website:
  title: "Visor fuego"
  site-url: "https://santiagomota.github.io/visor-fuego/"
  repo-url: "https://github.com/santiagomota/visor-fuego"
  repo-actions: [source, issue]
  search: true
  navbar:
    title: "Visor fuego"
    left:
      - href: index.qmd
        text: Mapa
      - href: summary.qmd
        text: Resumen
      - href: report.qmd
        text: Informe
      - href: history.qmd
        text: Evolución
      - href: copernicus.qmd
        text: Copernicus
    right:
      - icon: github
        href: "https://github.com/santiagomota/visor-fuego"
        aria-label: GitHub
  page-footer:
    left: "Datos: AEMET, NASA FIRMS, Copernicus/EFFIS y Eurostat/GISCO"
    right: "Generado con Quarto"

format:
  html:
    theme: cosmo
    css: styles.css
    toc: true
    toc-depth: 3
    page-layout: full
    code-fold: true
    code-tools: false
    embed-resources: false
    self-contained: false
    smooth-scroll: true
    link-external-newwindow: true
    lang: es

execute:
  echo: false
  warning: false
  message: false
  freeze: auto
