name: Actualizar visor fuego

on:
  workflow_dispatch:
  schedule:
    # GitHub Actions usa UTC. En verano: 07:30 y 12:30 hora peninsular aprox.
    - cron: "30 5,10 * * *"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  RSPM: https://packagemanager.posit.co/cran/__linux__/jammy/latest
  R_KEEP_PKG_SOURCE: no

jobs:
  update-dashboard:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "release"
          use-public-rspm: true

      - name: Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Instalar dependencias del sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcurl4-openssl-dev \
            libssl-dev \
            libxml2-dev \
            libgdal-dev \
            libgeos-dev \
            libproj-dev \
            libudunits2-dev \
            gdal-bin \
            libfontconfig1-dev \
            libharfbuzz-dev \
            libfribidi-dev \
            libfreetype6-dev \
            libpng-dev \
            libtiff5-dev \
            libjpeg-dev \
            pandoc

      - name: Instalar paquetes R desde Posit Package Manager
        shell: bash
        run: |
          cat > /tmp/install-r-packages.R <<'RSCRIPT'
          options(
            repos = c(CRAN = Sys.getenv("RSPM", unset = "https://packagemanager.posit.co/cran/__linux__/jammy/latest")),
            pkgType = "binary",
            Ncpus = max(1L, parallel::detectCores(logical = TRUE) - 1L)
          )

          pkgs <- unique(c(
            "curl", "jsonlite", "readr", "dplyr", "purrr", "stringr", "tibble",
            "fs", "glue", "tidyr", "httr2", "xml2", "lubridate",
            "sf", "terra", "stars", "units", "lwgeom",
            "leaflet", "leaflet.providers", "htmltools", "htmlwidgets",
            "rmarkdown", "knitr", "yaml", "DT", "plotly", "ggplot2",
            "png", "scales", "digest", "base64enc", "here", "cli"
          ))

          install_one <- function(pkg) {
            if (requireNamespace(pkg, quietly = TRUE)) return(invisible(TRUE))
            message("Instalando paquete R: ", pkg)
            tryCatch(
              install.packages(pkg, dependencies = c("Depends", "Imports", "LinkingTo"), type = "binary"),
              error = function(e) {
                message("Fallo instalando ", pkg, " como binario: ", conditionMessage(e))
              }
            )
            invisible(requireNamespace(pkg, quietly = TRUE))
          }

          ok <- vapply(pkgs, install_one, logical(1))
          missing <- pkgs[!vapply(pkgs, requireNamespace, logical(1), quietly = TRUE)]

          if (length(missing)) {
            message("Paquetes aún ausentes tras binarios RSPM: ", paste(missing, collapse = ", "))
            message("Reintentando instalación conjunta desde RSPM...")
            tryCatch(
              install.packages(missing, dependencies = c("Depends", "Imports", "LinkingTo"), type = "binary"),
              error = function(e) message("Reintento conjunto falló: ", conditionMessage(e))
            )
          }

          missing <- pkgs[!vapply(pkgs, requireNamespace, logical(1), quietly = TRUE)]
          if (length(missing)) {
            stop("Faltan paquetes R tras instalación RSPM: ", paste(missing, collapse = ", "), call. = FALSE)
          }

          message("Paquetes R instalados correctamente.")
          RSCRIPT

          Rscript /tmp/install-r-packages.R

      - name: Verificar paquetes R mínimos
        run: |
          Rscript - <<'RSCRIPT'
          required <- c(
            "curl", "jsonlite", "readr", "dplyr", "purrr", "stringr", "tibble",
            "fs", "glue", "tidyr", "httr2", "xml2", "sf", "terra", "leaflet",
            "htmlwidgets", "lubridate", "ggplot2", "plotly", "DT", "png"
          )
          missing <- required[!vapply(required, requireNamespace, logical(1), quietly = TRUE)]
          if (length(missing)) {
            stop("Faltan paquetes R tras install.packages(): ", paste(missing, collapse = ", "), call. = FALSE)
          }
          cat("OK paquetes R mínimos\n")
          RSCRIPT

      - name: Configurar variables
        run: |
          cat > .Renviron <<'EOF'
          AEMET_PROVIDER=classic
          AEMET_CLASSIC_VALID_START_OFFSET_DAYS=0
          AEMET_CLASSIC_KEEP_LATEST_ISSUE_ONLY=true
          AEMET_CLASSIC_CLEAN_RAW_BEFORE_INSTALL=true
          AEMET_INCLUDE_ORPHAN_RAW=false
          AEMET_CLEAN_WEB_ASSETS=true

          EFFIS_ENABLE=false
          EFFIS_RENDER_MODE=disabled

          FIRMS_MAP_KEY=${{ secrets.FIRMS_MAP_KEY }}
          FIRMS_SOURCES=VIIRS_SNPP_NRT,VIIRS_NOAA20_NRT
          FIRMS_DAYS=2
          FIRMS_BBOX=-19,27,5,44.6
          EOF

      - name: Actualizar datos
        run: |
          Rscript scripts/01_download_aemet_incendios.R
          Rscript scripts/02_prepare_web_assets.R
          Rscript scripts/05_download_firms_active_fires.R || true
          Rscript scripts/08_build_operational_alerts.R || true
          Rscript scripts/09_update_dashboard_history.R || true
          Rscript scripts/24_check_aemet_valid_dates.R

      - name: Renderizar sitio
        run: |
          quarto render --execute

      - name: Commit si hay cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/raw/aemet data/processed assets/aemet assets/firms assets/alerts assets/history docs || true

          if git diff --cached --quiet; then
            echo "No hay cambios que publicar."
          else
            git commit -m "Actualiza visor automáticamente"
            git push
          fi
