name: Actualizar visor fuego

on:
  workflow_dispatch:
  schedule:
    # 07:30 y 12:30 hora peninsular de verano aprox. GitHub Actions usa UTC.
    - cron: "30 5,10 * * *"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  R_KEEP_PKG_SOURCE: no
  MAKEFLAGS: -j2

jobs:
  update-dashboard:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Preparar librería R de usuario
        run: |
          mkdir -p "$RUNNER_TEMP/Rlib"
          echo "R_LIBS_USER=$RUNNER_TEMP/Rlib" >> "$GITHUB_ENV"
          echo "R_LIBS=$RUNNER_TEMP/Rlib" >> "$GITHUB_ENV"
          echo "R_LIBS_SITE=/usr/local/lib/R/site-library:/usr/lib/R/site-library:/usr/lib/R/library" >> "$GITHUB_ENV"

      - name: Instalar R, librerías geoespaciales y paquetes apt disponibles
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            r-base r-base-dev \
            libcurl4-openssl-dev libssl-dev libxml2-dev \
            libgdal-dev libgeos-dev libproj-dev libudunits2-dev \
            gdal-bin proj-bin make pandoc \
            libfontconfig1-dev libharfbuzz-dev libfribidi-dev \
            libfreetype6-dev libpng-dev libtiff5-dev libjpeg-dev

          # Paquetes R disponibles como binarios de Ubuntu. Leaflet no está en apt en ubuntu-24.04.
          pkgs=(
            r-cran-curl r-cran-jsonlite r-cran-readr r-cran-dplyr r-cran-purrr
            r-cran-stringr r-cran-tibble r-cran-fs r-cran-glue r-cran-tidyr
            r-cran-httr2 r-cran-xml2 r-cran-lubridate r-cran-sf r-cran-terra
            r-cran-stars r-cran-units r-cran-lwgeom r-cran-htmltools
            r-cran-htmlwidgets r-cran-rmarkdown r-cran-knitr r-cran-yaml
            r-cran-dt r-cran-plotly r-cran-ggplot2 r-cran-png r-cran-scales
            r-cran-digest r-cran-base64enc r-cran-here r-cran-cli r-cran-remotes
          )

          for pkg in "${pkgs[@]}"; do
            if apt-cache show "$pkg" >/dev/null 2>&1; then
              sudo apt-get install -y --no-install-recommends "$pkg"
            else
              echo "::warning::Paquete apt no disponible: $pkg; se intentará desde CRAN si hace falta"
            fi
          done

      - name: Instalar paquetes R restantes desde CRAN en librería de usuario
        shell: bash
        run: |
          cat > /tmp/install_required_packages.R <<'RSCRIPT'
          required <- c(
            "curl", "jsonlite", "readr", "dplyr", "purrr", "stringr", "tibble",
            "fs", "glue", "tidyr", "httr2", "xml2", "lubridate", "sf", "terra",
            "stars", "units", "lwgeom", "leaflet", "leaflet.providers", "htmltools",
            "htmlwidgets", "rmarkdown", "knitr", "yaml", "DT", "plotly", "ggplot2",
            "png", "scales", "digest", "base64enc", "here", "cli"
          )

          user_lib <- Sys.getenv("R_LIBS_USER", unset = file.path(Sys.getenv("RUNNER_TEMP"), "Rlib"))
          dir.create(user_lib, recursive = TRUE, showWarnings = FALSE)
          .libPaths(unique(c(user_lib, .libPaths())))

          message("R_LIBS_USER=", user_lib)
          message(".libPaths()=")
          print(.libPaths())

          installed <- rownames(installed.packages())
          missing <- setdiff(required, installed)
          message("Paquetes requeridos: ", paste(required, collapse = ", "))
          message("Paquetes faltantes antes de CRAN: ", if (length(missing)) paste(missing, collapse = ", ") else "ninguno")

          if (length(missing)) {
            options(repos = c(CRAN = "https://cloud.r-project.org"))
            install.packages(
              missing,
              lib = user_lib,
              dependencies = c("Depends", "Imports", "LinkingTo"),
              Ncpus = 2
            )
          }

          installed2 <- rownames(installed.packages(lib.loc = .libPaths()))
          missing2 <- setdiff(required, installed2)
          if (length(missing2)) {
            message("Paquetes R que siguen faltando tras la instalación:")
            print(missing2)
            sessionInfo()
            quit(status = 1)
          }

          message("Todos los paquetes R requeridos están disponibles.")
          RSCRIPT

          Rscript /tmp/install_required_packages.R

      - name: Diagnóstico de entorno
        shell: bash
        run: |
          R --version
          quarto --version
          gdalinfo --version
          Rscript - <<'RSCRIPT'
          message("R_LIBS_USER=", Sys.getenv("R_LIBS_USER"))
          print(.libPaths())
          pkgs <- c("sf", "terra", "leaflet", "leaflet.providers", "htmlwidgets", "dplyr", "readr")
          for (p in pkgs) {
            cat(p, "=>", as.character(utils::packageVersion(p)), "\n")
          }
          sessionInfo()
          RSCRIPT

      - name: Configurar variables del visor
        shell: bash
        run: |
          cat > .Renviron <<'EOF'
          AEMET_PROVIDER=classic
          AEMET_CLASSIC_VALID_START_OFFSET_DAYS=0
          AEMET_CLASSIC_KEEP_LATEST_ISSUE_ONLY=true
          AEMET_CLASSIC_CLEAN_RAW_BEFORE_INSTALL=true
          AEMET_INCLUDE_ORPHAN_RAW=false
          AEMET_CLEAN_WEB_ASSETS=true

          EFFIS_ENABLE=false
          EFFIS_RENDER_MODE=disabled

          FIRMS_MAP_KEY=${{ secrets.FIRMS_MAP_KEY }}
          FIRMS_SOURCES=VIIRS_SNPP_NRT,VIIRS_NOAA20_NRT
          FIRMS_DAYS=2
          FIRMS_BBOX=-19,27,5,44.6
          EOF

      - name: Actualizar datos
        shell: bash
        run: |
          Rscript scripts/01_download_aemet_incendios.R
          Rscript scripts/02_prepare_web_assets.R
          Rscript scripts/05_download_firms_active_fires.R || true
          Rscript scripts/08_build_operational_alerts.R || true
          Rscript scripts/09_update_dashboard_history.R || true
          Rscript scripts/24_check_aemet_valid_dates.R

      - name: Renderizar sitio
        shell: bash
        run: |
          quarto render --execute

      - name: Commit si hay cambios
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/raw/aemet data/processed assets/aemet assets/firms assets/alerts assets/history docs || true

          if git diff --cached --quiet; then
            echo "No hay cambios que publicar."
          else
            git commit -m "Actualiza visor automáticamente"
            git push
          fi
