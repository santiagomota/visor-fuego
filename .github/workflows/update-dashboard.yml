name: Actualizar visor fuego

on:
  workflow_dispatch:
  schedule:
    # GitHub Actions usa UTC.
    # 07:30 y 12:30 hora peninsular de verano aprox.
    - cron: "30 5,10 * * *"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  RSPM: "https://packagemanager.posit.co/cran/__linux__/jammy/latest"
  GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

jobs:
  update-dashboard:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "release"
          use-public-rspm: true

      - name: Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Instalar dependencias del sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcurl4-openssl-dev \
            libssl-dev \
            libxml2-dev \
            libgdal-dev \
            libgeos-dev \
            libproj-dev \
            libudunits2-dev \
            gdal-bin \
            libfontconfig1-dev \
            libharfbuzz-dev \
            libfribidi-dev \
            libfreetype6-dev \
            libpng-dev \
            libtiff5-dev \
            libjpeg-dev \
            make

      - name: Instalar paquetes R del visor
        shell: Rscript {0}
        run: |
          options(
            repos = c(CRAN = Sys.getenv("RSPM", unset = "https://cloud.r-project.org")),
            Ncpus = max(1L, parallel::detectCores() - 1L)
          )

          pkgs <- c(
            "curl", "jsonlite", "readr", "dplyr", "purrr", "stringr",
            "tibble", "fs", "glue", "tidyr", "httr2", "xml2",
            "sf", "terra", "leaflet", "htmltools", "htmlwidgets",
            "lubridate", "ggplot2", "plotly", "DT", "knitr", "rmarkdown",
            "png", "scales", "rlang", "vctrs", "cli"
          )

          installed <- rownames(installed.packages())
          missing <- setdiff(pkgs, installed)

          if (length(missing)) {
            message("Instalando paquetes R: ", paste(missing, collapse = ", "))
            install.packages(missing, dependencies = TRUE)
          }

          missing_after <- setdiff(pkgs, rownames(installed.packages()))
          if (length(missing_after)) {
            stop("Faltan paquetes R tras install.packages(): ", paste(missing_after, collapse = ", "))
          }

      - name: Configurar variables
        run: |
          cat > .Renviron <<'EOF'
          AEMET_PROVIDER=classic
          AEMET_CLASSIC_VALID_START_OFFSET_DAYS=0
          AEMET_CLASSIC_KEEP_LATEST_ISSUE_ONLY=true
          AEMET_CLASSIC_CLEAN_RAW_BEFORE_INSTALL=true
          AEMET_INCLUDE_ORPHAN_RAW=false
          AEMET_CLEAN_WEB_ASSETS=true

          EFFIS_ENABLE=false
          EFFIS_RENDER_MODE=disabled

          FIRMS_MAP_KEY=${{ secrets.FIRMS_MAP_KEY }}
          FIRMS_SOURCES=VIIRS_SNPP_NRT,VIIRS_NOAA20_NRT
          FIRMS_DAYS=2
          FIRMS_BBOX=-19,27,5,44.6
          EOF

      - name: Actualizar datos AEMET
        run: |
          Rscript scripts/01_download_aemet_incendios.R
          Rscript scripts/02_prepare_web_assets.R
          Rscript scripts/24_check_aemet_valid_dates.R

      - name: Actualizar FIRMS y alertas
        run: |
          Rscript scripts/05_download_firms_active_fires.R || true
          Rscript scripts/08_build_operational_alerts.R || true
          Rscript scripts/09_update_dashboard_history.R || true

      - name: Renderizar sitio
        run: |
          quarto render --execute

      - name: Commit si hay cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/raw/aemet data/processed assets/aemet assets/firms assets/alerts assets/history docs || true

          if git diff --cached --quiet; then
            echo "No hay cambios que publicar."
          else
            git commit -m "Actualiza visor automáticamente"
            git push
          fi
