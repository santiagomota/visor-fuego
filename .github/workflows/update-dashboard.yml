name: Actualizar visor fuego

on:
  workflow_dispatch:
  schedule:
    # GitHub Actions usa UTC. 05:30 y 10:30 UTC ≈ 07:30 y 12:30 CEST.
    - cron: "30 5,10 * * *"

permissions:
  contents: write

concurrency:
  group: update-dashboard
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  R_KEEP_PKG_SOURCE: no
  MAKEFLAGS: -j2

jobs:
  update-dashboard:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Instalar R, librerías geoespaciales y paquetes apt disponibles
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            r-base r-base-dev \
            pandoc \
            gdal-bin proj-bin \
            libcurl4-openssl-dev libssl-dev libxml2-dev \
            libgdal-dev libgeos-dev libproj-dev libudunits2-dev \
            libfontconfig1-dev libharfbuzz-dev libfribidi-dev \
            libfreetype6-dev libpng-dev libtiff-dev libjpeg-dev \
            libgit2-dev libicu-dev make gcc g++ ca-certificates

          # Paquetes R disponibles en Ubuntu. leaflet no suele estar en apt,
          # por eso se instala después desde CRAN.
          APT_R_PACKAGES=(
            r-cran-curl
            r-cran-jsonlite
            r-cran-readr
            r-cran-dplyr
            r-cran-purrr
            r-cran-stringr
            r-cran-tibble
            r-cran-fs
            r-cran-glue
            r-cran-tidyr
            r-cran-httr2
            r-cran-xml2
            r-cran-lubridate
            r-cran-sf
            r-cran-terra
            r-cran-stars
            r-cran-units
            r-cran-lwgeom
            r-cran-htmltools
            r-cran-htmlwidgets
            r-cran-rmarkdown
            r-cran-knitr
            r-cran-yaml
            r-cran-dt
            r-cran-plotly
            r-cran-ggplot2
            r-cran-png
            r-cran-scales
            r-cran-digest
            r-cran-base64enc
            r-cran-here
            r-cran-cli
            r-cran-raster
            r-cran-sp
            r-cran-crosstalk
            r-cran-magrittr
            r-cran-markdown
            r-cran-jquerylib
            r-cran-r6
            r-cran-viridislite
            r-cran-remotes
          )

          for pkg in "${APT_R_PACKAGES[@]}"; do
            if apt-cache show "$pkg" >/dev/null 2>&1; then
              echo "Instalando $pkg"
              sudo apt-get install -y --no-install-recommends "$pkg"
            else
              echo "::warning::Paquete apt no disponible: $pkg; se intentará desde CRAN si hace falta"
            fi
          done

      - name: Instalar paquetes R restantes desde CRAN
        shell: bash
        run: |
          set -euo pipefail
          cat > /tmp/install_required_packages.R <<'RSCRIPT'
          options(
            repos = c(CRAN = "https://cloud.r-project.org"),
            install.packages.check.source = "no"
          )

          required <- c(
            "curl", "jsonlite", "readr", "dplyr", "purrr", "stringr", "tibble",
            "fs", "glue", "tidyr", "httr2", "xml2", "lubridate", "sf", "terra",
            "stars", "units", "lwgeom", "leaflet", "leaflet.providers", "htmltools",
            "htmlwidgets", "rmarkdown", "knitr", "yaml", "DT", "plotly", "ggplot2",
            "png", "scales", "digest", "base64enc", "here", "cli", "raster", "sp",
            "crosstalk", "magrittr", "markdown", "jquerylib", "R6", "viridisLite"
          )

          installed <- rownames(installed.packages())
          missing <- setdiff(required, installed)

          message("Paquetes requeridos: ", paste(required, collapse = ", "))
          message("Paquetes faltantes antes de CRAN: ", if (length(missing)) paste(missing, collapse = ", ") else "ninguno")

          if (length(missing)) {
            install.packages(missing, dependencies = TRUE, Ncpus = 2)
          }

          installed2 <- rownames(installed.packages())
          missing2 <- setdiff(required, installed2)

          if (length(missing2)) {
            message("\nPaquetes R que siguen faltando:")
            print(missing2)
            message("\n.libPaths():")
            print(.libPaths())
            message("\nsessionInfo():")
            print(sessionInfo())
            quit(status = 1)
          }

          message("Todos los paquetes R requeridos están instalados.")
          RSCRIPT

          Rscript /tmp/install_required_packages.R

      - name: Diagnóstico de entorno
        shell: bash
        run: |
          set -euo pipefail
          R --version
          quarto --version
          gdalinfo --version
          Rscript -e 'pkgs <- c("sf", "terra", "leaflet", "htmlwidgets", "dplyr", "readr"); print(vapply(pkgs, packageVersion, character(1)))'

      - name: Configurar variables del visor
        shell: bash
        run: |
          set -euo pipefail
          cat > .Renviron <<EOF
          AEMET_PROVIDER=classic
          AEMET_CLASSIC_VALID_START_OFFSET_DAYS=0
          AEMET_CLASSIC_KEEP_LATEST_ISSUE_ONLY=true
          AEMET_CLASSIC_CLEAN_RAW_BEFORE_INSTALL=true
          AEMET_INCLUDE_ORPHAN_RAW=false
          AEMET_CLEAN_WEB_ASSETS=true

          EFFIS_ENABLE=false
          EFFIS_RENDER_MODE=disabled

          FIRMS_MAP_KEY=${{ secrets.FIRMS_MAP_KEY }}
          FIRMS_SOURCES=VIIRS_SNPP_NRT,VIIRS_NOAA20_NRT
          FIRMS_DAYS=2
          FIRMS_BBOX=-19,27,5,44.6
          EOF

      - name: Actualizar datos
        shell: bash
        run: |
          set -euo pipefail
          Rscript scripts/01_download_aemet_incendios.R
          Rscript scripts/02_prepare_web_assets.R
          Rscript scripts/24_check_aemet_valid_dates.R
          Rscript scripts/05_download_firms_active_fires.R || echo "::warning::FIRMS no se pudo actualizar"
          Rscript scripts/08_build_operational_alerts.R || echo "::warning::Alertas operativas no se pudieron actualizar"
          Rscript scripts/09_update_dashboard_history.R || echo "::warning::Histórico no se pudo actualizar"

      - name: Renderizar sitio
        shell: bash
        run: |
          set -euo pipefail
          quarto render --execute

      - name: Commit si hay cambios
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/raw/aemet data/processed assets/aemet assets/firms assets/alerts assets/history docs || true

          if git diff --cached --quiet; then
            echo "No hay cambios que publicar."
          else
            git commit -m "Actualiza visor automáticamente"
            git push
          fi
