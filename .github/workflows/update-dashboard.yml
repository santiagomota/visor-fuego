name: Actualizar visor fuego

on:
  workflow_dispatch:
  schedule:
    - cron: "30 4,12 * * *"
      timezone: "Europe/Madrid"

permissions:
  contents: write

concurrency:
  group: actualizar-visor-fuego
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  R_KEEP_PKG_SOURCE: no
  MAKEFLAGS: -j2

jobs:
  update-dashboard:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Los eventos programados solo se ejecutan sobre la rama predeterminada.
          # En las ejecuciones manuales usamos también esa rama para publicar siempre
          # en el mismo destino.
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0

      - name: Mostrar motivo y horario de ejecución
        run: |
          echo "Evento: $GITHUB_EVENT_NAME"
          echo "Rama de publicación: ${{ github.event.repository.default_branch }}"
          echo "Hora UTC: $(date -u '+%Y-%m-%d %H:%M:%S %Z')"
          echo "Hora Madrid: $(TZ=Europe/Madrid date '+%Y-%m-%d %H:%M:%S %Z')"

      - name: Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Preparar librería R de usuario
        run: |
          mkdir -p "$RUNNER_TEMP/Rlib"
          echo "R_LIBS_USER=$RUNNER_TEMP/Rlib" >> "$GITHUB_ENV"
          echo "R_LIBS=$RUNNER_TEMP/Rlib" >> "$GITHUB_ENV"
          echo "R_LIBS_SITE=/usr/local/lib/R/site-library:/usr/lib/R/site-library:/usr/lib/R/library" >> "$GITHUB_ENV"

      - name: Instalar R, librerías geoespaciales y paquetes apt disponibles
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            r-base r-base-dev \
            libcurl4-openssl-dev libssl-dev libxml2-dev \
            libgdal-dev libgeos-dev libproj-dev libudunits2-dev \
            gdal-bin proj-bin pandoc ca-certificates

          apt_pkgs=(
            r-cran-curl r-cran-jsonlite r-cran-readr r-cran-dplyr r-cran-purrr
            r-cran-stringr r-cran-tibble r-cran-fs r-cran-glue r-cran-tidyr
            r-cran-httr2 r-cran-xml2 r-cran-lubridate r-cran-sf r-cran-terra
            r-cran-stars r-cran-units r-cran-lwgeom r-cran-htmltools
            r-cran-htmlwidgets r-cran-rmarkdown r-cran-knitr r-cran-yaml
            r-cran-dt r-cran-plotly r-cran-ggplot2 r-cran-png r-cran-scales
            r-cran-digest r-cran-base64enc r-cran-here r-cran-cli
            r-cran-sp r-cran-raster r-cran-magrittr r-cran-markdown
            r-cran-viridislite r-cran-rcolorbrewer r-cran-crosstalk r-cran-jquerylib
            r-cran-remotes
          )

          for pkg in "${apt_pkgs[@]}"; do
            if apt-cache show "$pkg" >/dev/null 2>&1; then
              sudo apt-get install -y --no-install-recommends "$pkg"
            else
              echo "::warning::Paquete apt no disponible: $pkg; se intentará desde CRAN si hace falta"
            fi
          done

      - name: Instalar paquetes R restantes desde CRAN en librería de usuario
        run: |
          cat > /tmp/install_required_packages.R <<'RSCRIPT'
          required <- c(
            "curl", "jsonlite", "readr", "dplyr", "purrr", "stringr", "tibble",
            "fs", "glue", "tidyr", "httr2", "xml2", "lubridate", "sf", "terra",
            "stars", "units", "lwgeom", "leaflet", "leaflet.providers", "htmltools",
            "htmlwidgets", "rmarkdown", "knitr", "yaml", "DT", "plotly", "ggplot2",
            "png", "scales", "digest", "base64enc", "here", "cli",
            "sp", "raster", "magrittr", "markdown", "viridisLite", "RColorBrewer",
            "crosstalk", "jquerylib"
          )

          user_lib <- Sys.getenv("R_LIBS_USER", unset = file.path(Sys.getenv("RUNNER_TEMP"), "Rlib"))
          dir.create(user_lib, recursive = TRUE, showWarnings = FALSE)
          .libPaths(unique(c(user_lib, .libPaths())))

          message("R_LIBS_USER=", user_lib)
          print(.libPaths())
          options(repos = c(CRAN = "https://cloud.r-project.org"))

          is_available <- function(pkg) {
            suppressWarnings(requireNamespace(pkg, quietly = TRUE))
          }

          missing <- required[!vapply(required, is_available, logical(1))]
          message("Paquetes faltantes antes de CRAN: ", if (length(missing)) paste(missing, collapse = ", ") else "ninguno")

          leaflet_pkgs <- c("leaflet.providers", "leaflet")
          non_leaflet_missing <- setdiff(missing, leaflet_pkgs)

          if (length(non_leaflet_missing)) {
            install.packages(
              non_leaflet_missing,
              lib = user_lib,
              dependencies = c("Depends", "Imports", "LinkingTo"),
              Ncpus = 2
            )
          }

          if (!is_available("leaflet.providers")) {
            install.packages("leaflet.providers", lib = user_lib, dependencies = FALSE, Ncpus = 2)
          }

          if (!is_available("leaflet")) {
            install.packages("leaflet", lib = user_lib, dependencies = FALSE, Ncpus = 2)
          }

          missing2 <- required[!vapply(required, is_available, logical(1))]
          if (length(missing2)) {
            message("Paquetes R que siguen faltando tras la instalación:")
            print(missing2)
            sessionInfo()
            quit(status = 1)
          }

          message("Todos los paquetes R requeridos están disponibles.")
          RSCRIPT

          Rscript /tmp/install_required_packages.R

      - name: Diagnóstico de entorno
        run: |
          R --version
          quarto --version
          gdalinfo --version
          Rscript - <<'RSCRIPT'
          message("R_LIBS_USER=", Sys.getenv("R_LIBS_USER"))
          print(.libPaths())
          pkgs <- c("sf", "terra", "raster", "leaflet", "leaflet.providers", "htmlwidgets", "dplyr", "readr")
          for (p in pkgs) {
            suppressPackageStartupMessages(library(p, character.only = TRUE))
            cat(p, as.character(packageVersion(p)), "\n")
          }
          sessionInfo()
          RSCRIPT

      - name: Configurar variables del visor
        run: |
          cat > .Renviron <<EOF
          AEMET_PROVIDER=classic
          AEMET_CLASSIC_VALID_START_OFFSET_DAYS=0
          AEMET_CLASSIC_KEEP_LATEST_ISSUE_ONLY=true
          AEMET_CLASSIC_CLEAN_RAW_BEFORE_INSTALL=true
          AEMET_INCLUDE_ORPHAN_RAW=false
          AEMET_CLEAN_WEB_ASSETS=true

          EFFIS_ENABLE=false
          EFFIS_RENDER_MODE=disabled
          EFFIS_BA_ENABLE=true
          EFFIS_BA_OPTIONAL=true
          EFFIS_BA_BBOX=-19,27,5,44.6
          EFFIS_BA_MAX_DAYS=90
          EFFIS_BA_MIN_AREA_HA=5
          EFFIS_BA_SIMPLIFY_M=100

          FIRMS_MAP_KEY=${{ secrets.FIRMS_MAP_KEY }}
          FIRMS_SOURCES=VIIRS_SNPP_NRT,VIIRS_NOAA20_NRT
          FIRMS_DAYS=2
          FIRMS_BBOX=-19,27,5,44.6

          UPDATE_ADMIN_BOUNDARIES=false
          HISTORY_KEEP_DAYS=90
          HISTORY_MODE=daily_latest
          EOF

      - name: Actualizar datos y validar entradas
        run: |
          set -euo pipefail
          Rscript scripts/99_run_all.R

      - name: Renderizar sitio
        run: |
          set -euo pipefail
          quarto render --execute

      - name: Validar sitio publicado
        run: |
          set -euo pipefail
          Rscript scripts/11_check_published_assets.R

      - name: Commit y publicación de cambios
        env:
          TARGET_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # data/raw contiene descargas temporales y está excluido en .gitignore.
          git add -A -- data/processed assets docs

          if git diff --cached --quiet; then
            echo "No hay cambios que publicar."
            exit 0
          fi

          git commit -m "Actualiza visor automáticamente"

          # El proceso tarda varios minutos. Durante ese tiempo puede entrar un commit
          # nuevo en main. Rebasamos el commit generado y reintentamos el push sin
          # sobrescribir el historial remoto.
          for intento in 1 2 3; do
            echo "Intento de publicación $intento de 3"
            git fetch origin "$TARGET_BRANCH"

            if ! git rebase "origin/$TARGET_BRANCH"; then
              git rebase --abort || true
              echo "::error::No se pudo integrar de forma segura un cambio remoto. Revisa si se modificaron simultáneamente assets, data/processed o docs."
              exit 1
            fi

            if git push origin "HEAD:$TARGET_BRANCH"; then
              echo "Cambios publicados correctamente."
              exit 0
            fi

            sleep $((intento * 5))
          done

          echo "::error::No se pudo publicar después de tres intentos por cambios concurrentes en la rama remota."
          exit 1
